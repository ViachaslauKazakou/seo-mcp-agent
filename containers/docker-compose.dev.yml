services:
  app:
    build:
      context: ..
      dockerfile: containers/Dockerfile.dev
    container_name: seo_mcp_app_dev
    working_dir: /app
    command: ["python", "-Xfrozen_modules=off", "-m", "debugpy", "--listen", "0.0.0.0:5678", "-m", "uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8030:8000"
      - "5678:5678"
    environment:
      PYTHONPATH: /app/src:/app
      PYTHONUNBUFFERED: "1"
      PLAYWRIGHT_HEADLESS: "true"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: seo_agent
      POSTGRES_USER: seo_user
      POSTGRES_PASSWORD: seo_password
      DATABASE_URL: postgresql+asyncpg://seo_user:seo_password@postgres:5432/seo_agent
    volumes:
      - ..:/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg15
    container_name: seo_mcp_postgres_dev
    environment:
      POSTGRES_DB: seo_agent
      POSTGRES_USER: seo_user
      POSTGRES_PASSWORD: seo_password
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../docker/init-pgvector.sql:/docker-entrypoint-initdb.d/01-init-pgvector.sql
      - ../docker/init-extensions.sql:/docker-entrypoint-initdb.d/02-init-extensions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seo_user -d seo_agent"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  postgres_data:
